<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Rifa App</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="app">

  <section class="hero">
  <span class="hero__badge">✦ Rifa App</span>
  <h1 class="hero__title">Gestiona tus rifas<br>en segundos.</h1>
  <p class="hero__sub">Sin papeles, sin fotos editadas.<br>Todo desde tu celular.</p>
  <button class="btn btn--primary" id="btn-nueva">+ Nueva rifa</button>
  
</section>

    <!-- MIS RIFAS -->
    <section class="list-section">
      <h2 class="section-title">Mis rifas</h2>

      <div class="list-empty" id="list-empty">
        <p>No tienes rifas todavía.</p>
        <p class="list-empty__sub">Crea una con el botón de arriba.</p>
      </div>

      <ul class="rifa-list" id="rifa-list"></ul>
    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
