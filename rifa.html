<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rifa</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/rifa.css" />
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="page-header">
      <a href="index.html" class="btn-back">← Volver</a>
      <h1 class="page-title" id="rifa-title">Cargando...</h1>
    </header>

    <!-- INFO CARD -->
    <div class="info-card">
      <div class="info-item">
        <span class="info-item__label">Precio</span>
        <span class="info-item__value" id="info-price">—</span>
      </div>
      <div class="info-item">
        <span class="info-item__label">Sorteo</span>
        <span class="info-item__value" id="info-date">—</span>
      </div>
      <div class="info-item">
        <span class="info-item__label">Lotería</span>
        <span class="info-item__value" id="info-lottery">—</span>
      </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stats-bar__item">
        <span class="stats-bar__num" id="stat-sold">0</span>
        <span class="stats-bar__label">Vendidos</span>
      </div>
      <div class="stats-bar__divider"></div>
      <div class="stats-bar__item">
        <span class="stats-bar__num" id="stat-free">0</span>
        <span class="stats-bar__label">Libres</span>
      </div>
      <div class="stats-bar__divider"></div>
      <div class="stats-bar__item">
        <span class="stats-bar__num" id="stat-total">0</span>
        <span class="stats-bar__label">Total</span>
      </div>
    </div>

    <!-- GRID -->
    <div class="num-grid" id="num-grid"></div>

    <!-- SHARE BTN -->
    <button class="btn btn--primary btn--full" id="btn-share">Compartir ticket 📤</button>

  </div>

  <!-- MODAL: registrar comprador -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <p class="modal__num" id="modal-num">00</p>
      <h3 class="modal__title" id="modal-title">¿Quién compró este número?</h3>
      <input class="form-input" id="modal-input" type="text" placeholder="Nombre del cliente" maxlength="40" />
      <p class="modal__buyer" id="modal-buyer" style="display:none"></p>
<button class="btn btn--ghost" id="modal-edit" style="display:none">✏️ Editar nombre</button>
      <div class="modal__actions">
        <button class="btn btn--primary" id="modal-confirm">Confirmar venta</button>
        <button class="btn btn--ghost" id="modal-cancel">Cancelar</button>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/rifa.js"></script>
<!-- TICKET PARA COMPARTIR -->
<div id="ticket-share" style="position:fixed;left:-9999px;top:0;width:480px;background:#ECEAE5;border-radius:16px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
<div style="height:10px;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2210%22><rect width=%2218%22 height=%2210%22 fill=%22%231a1a1a%22/></svg>');background-repeat:repeat-x;"></div>
  <div style="background:#fff;padding:18px 20px 14px;border-bottom:1.5px solid #e8e5e0;">
    <h2 id="ts-prize" style="font-size:26px;font-weight:900;color:#1a1a1a;margin:0 0 14px;letter-spacing:-0.6px;line-height:1.1;text-align:center;"></h2>
    <div style="display:flex;gap:40px;justify-content:center">
      <div><span style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.6px;">Precio</span><div id="ts-price" style="font-size:13px;font-weight:700;color:#1a1a1a;margin-top:2px;"></div></div>
      <div><span style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.6px;">Sorteo</span><div id="ts-date" style="font-size:13px;font-weight:700;color:#1a1a1a;margin-top:2px;"></div></div>
      <div><span style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.6px;">Lotería</span><div id="ts-lottery" style="font-size:13px;font-weight:700;color:#1a1a1a;margin-top:2px;"></div></div>
    </div>
  </div>
  <div id="ts-grid" style="padding:14px;display:grid;gap:5px;"></div>
  <div style="background:#fff;padding:10px 20px;border-top:1.5px solid #e8e5e0;display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:11px;color:#999;">Rifa App</span>
    <span id="ts-count" style="font-size:12px;color:#666;"></span>
    
  </div>
</div>
</body>
</html>
