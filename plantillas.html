<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bungee&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/icons/icon-32x32.png">
  <title>Plantillas de ticket</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/rifa.css" />
  <link rel="stylesheet" href="css/plantillas.css" />
</head>
<body>

  <div class="app">

    <header class="page-header">
            <a href="index.html" class="back-btn">
  <svg viewBox="0 0 20 20" width="15" height="15" class="back-arrow">
    <path d="M 14 10 L 5 10 M 5 10 L 9 6 M 5 10 L 9 14"
      stroke="#1a1a1a" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <span class="back-label">Volver</span>
  <div class="back-line"></div>
</a>
      <h1 class="page-title">Plantillas de ticket</h1>
    </header>

    <p class="plantillas-sub">Elige el diseño que se usará al compartir tus rifas</p>

    <div class="plantillas-list">

      <label class="plantilla-card" data-template="azul">
        <input type="radio" name="plantilla" value="azul" />
        <div class="plantilla-preview plantilla-preview--azul">
          <div class="pp-badge">Rifa Oficial</div>
          <div class="pp-title">Smart TV</div>
        </div>
        <div class="plantilla-info">
          <div class="plantilla-name">Azul Marino</div>
          <div class="plantilla-desc">Elegante y clásico</div>
        </div>
        <button class="check-btn" aria-pressed="false">
  <div class="check-circle">
    <svg viewBox="0 0 20 20" width="12" height="12" overflow="visible">
      <path class="check-path" d="M 4.5 10 L 8.5 14 L 15.5 6"
        fill="none" stroke="#F5C842" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="20" stroke-dashoffset="20"/>
    </svg>
  </div>
</button>
      </label>  
      <label class="plantilla-card" data-template="esmeralda">
        <input type="radio" name="plantilla" value="esmeralda" />
        <div class="plantilla-preview plantilla-preview--esmeralda">
          <div class="pp-badge-esm">Rifa Oficial</div>
          <div class="pp-title">Smart TV</div>
        </div>
        <div class="plantilla-info">
          <div class="plantilla-name">Verde Esmeralda</div>
          <div class="plantilla-desc">Fresco y moderno</div>
        </div>
       <button class="check-btn" aria-pressed="false">
  <div class="check-circle">
    <svg viewBox="0 0 20 20" width="16" height="16" overflow="visible">
      <path class="check-path" d="M 4.5 10 L 8.5 14 L 15.5 6"
        fill="none" stroke="#F5C842" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="20" stroke-dashoffset="20"/>
    </svg>
  </div>
</button>
      </label>

      <label class="plantilla-card" data-template="retro">
        <input type="radio" name="plantilla" value="retro" />
        <div class="plantilla-preview plantilla-preview--retro">
          <div class="pp-sun">☀</div>
          <div class="pp-title-retro">RIFA</div>
        </div>
        <div class="plantilla-info">
          <div class="plantilla-name">Retro Rosa</div>
          <div class="plantilla-desc">Estilo vintage groovy</div>
        </div>
       <button class="check-btn" aria-pressed="false">
  <div class="check-circle">
    <svg viewBox="0 0 20 20" width="16" height="16" overflow="visible">
      <path class="check-path" d="M 4.5 10 L 8.5 14 L 15.5 6"
        fill="none" stroke="#F5C842" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="20" stroke-dashoffset="20"/>
    </svg>
  </div>
</button>
      </label>

  

    </div>

  </div>

  <script src="js/plantillas.js"></script>
</body>
</html>
