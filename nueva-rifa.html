<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/icons/icon-32x32.png">
  <title>Nueva Rifa</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/nueva-rifa.css" />
  <link rel="stylesheet" href="/css/datepicker.css">
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="page-header">
            <a href="index.html" class="back-btn">
  <svg viewBox="0 0 20 20" width="15" height="15" class="back-arrow">
    <path d="M 14 10 L 5 10 M 5 10 L 9 6 M 5 10 L 9 14"
      stroke="#1a1a1a" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <span class="back-label">Volver</span>
  <div class="back-line"></div>
</a>
      <h1 class="page-title">Nueva rifa</h1>
    </header>

    <!-- FORM -->
    <div class="form-card">

      <div class="form-group">
        <label class="form-label" for="f-prize">¿Qué se rifa?</label>
        <input class="form-input" id="f-prize" type="text" placeholder="Ej: Smart TV Samsung 55'" maxlength="60" />
      </div>

      <div class="form-group">
        <label class="form-label" for="f-price">Precio de la boleta</label>
        <input class="form-input" id="f-price" type="text" placeholder="Ej: $10.000" maxlength="20" />
      </div>

      <div class="form-group">
        <label class="form-label">Números disponibles</label>
        <div class="range-grid">
          <label class="range-opt">
            <input type="radio" name="rango" value="10" />
            <span>00 – 09<br><small>10 números</small></span>
          </label>
          <label class="range-opt">
            <input type="radio" name="rango" value="50" checked />
            <span>00 – 49<br><small>50 números</small></span>
          </label>
          <label class="range-opt">
            <input type="radio" name="rango" value="100" />
            <span>00 – 99<br><small>100 números</small></span>
          </label>
          <label class="range-opt">
            <input type="radio" name="rango" value="200" />
            <span>00 – 199<br><small>200 números</small></span>
          </label>
        </div>
      </div>

      <div class="form-row">
       <div class="form-group">
  <label class="form-label">Fecha del sorteo</label>

  <button
    type="button"
    class="form-input"
    id="btn-date"
    style="text-align:left;cursor:pointer;">

    <span id="btn-date-text">Seleccionar fecha</span>

  </button>

  <!-- Aquí seguiremos guardando la fecha -->
  <input type="hidden" id="f-date">
</div>
        <div class="form-group">
          <label class="form-label" for="f-lottery">Lotería</label>
          <select class="form-input" id="f-lottery">
            <option value="">Seleccionar...</option>
            <option>Lotería de Bogotá</option>
            <option>Lotería de Medellín</option>
            <option>Lotería del Cauca</option>
            <option>Lotería del Tolima</option>
            <option>Lotería de Boyacá</option>
            <option>Lotería del Huila</option>
            <option>Lotería del Valle</option>
            <option>Lotería de Santander</option>
            <option>Baloto</option>
            <option>Chance</option>
            <option>Otra</option>
          </select>
          <input class="form-input" id="f-lottery-custom" type="text" placeholder="¿Con cuál lotería?" style="display:none;margin-top:8px;" maxlength="40" />
        </div>
      </div>
<div class="form-group">
  <label class="form-label" for="f-whatsapp">WhatsApp (opcional)</label>
  <input class="form-input" id="f-whatsapp" type="text" placeholder="Ej: 300 123 4567" maxlength="20" />
</div>
      <button class="btn btn--primary btn--full" id="btn-crear">Generar rifa </button>

    </div>
  </div>
<div class="dp-page" id="dp-modal">
  <div class="dp-wrapper">
    <div class="dp-card">

      <!-- Header -->
      <div class="dp-header">
        <p class="dp-label">Fecha seleccionada</p>
        <p class="dp-weekday" id="dp-weekday">Miércoles,</p>
        <p class="dp-date-accent" id="dp-date-accent">23 de julio de 2025</p>
      </div>

      <!-- Drum picker (móvil) -->
      <div class="dp-drum-wrap" id="dp-drum">
        <p class="dp-hint">Desliza para elegir</p>
        <div class="dp-drum-row">
          <div class="dp-column" id="col-day" style="width:64px"></div>
          <div class="dp-column" id="col-month" style="width:144px"></div>
          <div class="dp-column" id="col-year" style="width:96px"></div>
        </div>
      </div>

      <!-- Calendario (desktop) -->
      <div class="dp-calendar-wrap" id="dp-calendar">
        <div class="dp-cal-header">
          <button class="dp-arrow" id="dp-prev">‹</button>
          <div class="dp-cal-nav">
            <button class="dp-nav-btn" id="dp-month-btn"></button>
            <button class="dp-nav-btn" id="dp-year-btn"></button>
          </div>
          <button class="dp-arrow" id="dp-next">›</button>
        </div>
        <div class="dp-days-header">
          <span>Do</span><span>Lu</span><span>Ma</span>
          <span>Mi</span><span>Ju</span><span>Vi</span><span>Sá</span>
        </div>
        <div class="dp-days-grid" id="dp-days-grid"></div>
        <div class="dp-overlay dp-months-grid" id="dp-months-overlay"></div>
        <div class="dp-overlay dp-years-grid" id="dp-years-overlay"></div>
      </div>

      <!-- Un solo botón, al final, fuera de ambas secciones -->
      <button class="dp-confirm" id="dp-confirm">Confirmar fecha</button>

    </div>
  </div>
</div>




  <script src="js/nueva-rifa.js"></script>
  <script src="/js/datepicker.js"></script>
</body>
</html>
