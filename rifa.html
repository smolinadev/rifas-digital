<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bungee&display=swap" rel="stylesheet">
  <title>Rifa</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/rifa.css" />
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="page-header">
            <a href="index.html" class="back-btn">
  <svg viewBox="0 0 20 20" width="15" height="15" class="back-arrow">
    <path d="M 14 10 L 5 10 M 5 10 L 9 6 M 5 10 L 9 14"
      stroke="#1a1a1a" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <span class="back-label">Volver</span>
  <div class="back-line"></div>
</a>
      <h1 class="page-title" id="rifa-title">Cargando...</h1>
    </header>

    <!-- INFO CARD -->
    <div class="info-card">
      <div class="info-item">
        <span class="info-item__label">Precio</span>
        <span class="info-item__value" id="info-price">—</span>
      </div>
      <div class="info-item">
        <span class="info-item__label">Sorteo</span>
        <span class="info-item__value" id="info-date">—</span>
      </div>
      <div class="info-item">
        <span class="info-item__label">Lotería</span>
        <span class="info-item__value" id="info-lottery">—</span>
      </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
  <div class="stats-bar__nums">
    <div class="stats-bar__item">
      <span class="stats-bar__num" id="stat-sold">0</span>
      <span class="stats-bar__label">Vendidos</span>
    </div>
    <div class="stats-bar__item">
      <span class="stats-bar__num" id="stat-free">0</span>
      <span class="stats-bar__label">Libres</span>
    </div>
    <div class="stats-bar__item">
      <span class="stats-bar__num" id="stat-total">0</span>
      <span class="stats-bar__label">Total</span>
    </div>
  </div>
  <div class="stats-bar__bar">
    <div class="stats-bar__fill" id="stat-bar"></div>
  </div>
  <div class="stats-bar__pct" id="stat-pct">0% vendido</div>
</div>
    <!-- GRID -->
    <div class="num-grid" id="num-grid"></div>

    <!-- SHARE BTN -->
    <button class="btn btn--primary btn--fab" id="btn-share"> Compartir</button>

  </div>

  <!-- MODAL: registrar comprador -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <p class="modal__num" id="modal-num">00</p>
      <h3 class="modal__title" id="modal-title">¿Quién compró este número?</h3>
      <input class="form-input" id="modal-input" type="text" placeholder="Nombre del cliente" maxlength="40" />
      <p class="modal__buyer" id="modal-buyer" style="display:none"></p>
<button class="btn btn--ghost" id="modal-edit" style="display:none">✏️ Editar nombre</button>
      <div class="modal__actions">
        <button class="btn btn--primary btn--full" id="modal-confirm">Confirmar venta</button>
        <button class="btn btn--ghost" id="modal-cancel">Cancelar</button>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/rifa.js"></script>
<!-- TICKET PARA COMPARTIR -->
<div id="ticket-share" style="position:fixed;left:-9999px;top:0;width:420px;background:#0f2744;border-radius:20px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

  <div style="background:#0f2744;padding:28px 24px 20px;text-align:center;border-bottom:1px solid #1a3a5c;">
    <div style="display:inline-block;border:1px solid #F5C842;color:#F5C842;font-size:10px;font-weight:700;padding:4px 14px;border-radius:99px;letter-spacing:1.5px;margin-bottom:14px;text-transform:uppercase;">Rifa Oficial</div>
    <h2 id="ts-prize" style="color:#fff;font-size:26px;font-weight:900;margin:0 0 6px;letter-spacing:-0.5px;line-height:1.15;"></h2>
    <p style="color:#F5C842;font-size:11px;font-weight:600;margin:0;letter-spacing:0.5px;">¡Participa y gana!</p>
  </div>

  <div style="display:flex;border-bottom:1px solid #1a3a5c;border-top:1px solid #1a3a5c;">
    <div style="flex:1;padding:10px 8px;text-align:center;border-right:1px solid #1a3a5c;">
      <span style="display:block;font-size:9px;color:#4a7aaa;text-transform:uppercase;letter-spacing:0.8px;">Precio</span>
      <strong id="ts-price" style="display:block;font-size:12px;color:#F5C842;font-weight:700;margin-top:3px;"></strong>
    </div>
    <div style="flex:1;padding:10px 8px;text-align:center;border-right:1px solid #1a3a5c;">
      <span style="display:block;font-size:9px;color:#4a7aaa;text-transform:uppercase;letter-spacing:0.8px;">Sorteo</span>
      <strong id="ts-date" style="display:block;font-size:12px;color:#F5C842;font-weight:700;margin-top:3px;"></strong>
    </div>
    <div style="flex:1;padding:10px 8px;text-align:center;">
      <span style="display:block;font-size:9px;color:#4a7aaa;text-transform:uppercase;letter-spacing:0.8px;">Lotería</span>
      <strong id="ts-lottery" style="display:block;font-size:12px;color:#F5C842;font-weight:700;margin-top:3px;"></strong>
    </div>
  </div>

  <div id="ts-grid" style="padding:14px 12px;display:grid;gap:4px;"></div>

  <div style="background:#0a1e36;padding:14px 20px;border-top:1px solid #1a3a5c;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <span style="display:block;font-size:9px;color:#4a7aaa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;">Contacto</span>
      <span id="ts-whatsapp" style="font-size:12px;color:#F5C842;font-weight:700;"></span>
    </div>
    <div style="text-align:right;">
      <span style="display:block;font-size:9px;color:#4a7aaa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;">Vendidos</span>
      <span id="ts-count" style="font-size:13px;color:#F5C842;font-weight:700;"></span>
    </div>
  </div>

</div>
<!-- TICKET RETRO ROSA -->
<div id="ticket-share-retro" style="position:fixed;left:-9999px;top:0;width:420px;background:linear-gradient(160deg,#f9e4e7,#f3d4da);border-radius:20px;padding:32px 24px;text-align:center;font-family:'Nunito',-apple-system,sans-serif;">
  <div style="font-size:28px;color:#5a4a4f;margin-bottom:8px;">☀</div>
  <h2 id="tsr-prize" style="font-family:'Bungee',sans-serif;font-size:30px;color:#4a3d42;margin:0;line-height:1.15;"></h2>
  <p style="font-size:13px;font-style:italic;color:#6b5a5f;margin:14px 0 4px;font-weight:600;">¡Participa y gana!</p>
  <p id="tsr-info" style="font-size:13px;font-weight:700;color:#4a3d42;margin:0 0 18px;"></p>
  <div id="tsr-grid" style="display:grid;gap:6px;background:rgba(255,255,255,0.4);padding:14px;border-radius:14px;"></div>
  <p id="tsr-footer" style="font-size:11px;color:#8a7a7f;margin-top:18px;letter-spacing:0.5px;"></p>
</div>
<!-- TICKET VERDE ESMERALDA -->
<div id="ticket-share-esmeralda" style="position:fixed;left:-9999px;top:0;width:420px;background:#0d2b1f;border-radius:20px;overflow:hidden;font-family:'Nunito',-apple-system,sans-serif;">
  <div style="padding:28px 24px 20px;text-align:center;border-bottom:1px solid #1e4a35;">
    <div style="display:inline-block;border:1px solid #6ee7a8;color:#6ee7a8;font-size:10px;font-weight:700;padding:4px 14px;border-radius:99px;letter-spacing:1.5px;margin-bottom:14px;text-transform:uppercase;">Rifa Oficial</div>
    <h2 id="tse-prize" style="color:#fff;font-size:26px;font-weight:900;margin:0 0 6px;letter-spacing:-0.5px;line-height:1.15;"></h2>
    <p style="color:#6ee7a8;font-size:11px;font-weight:600;margin:0;letter-spacing:0.5px;">¡Participa y gana!</p>
  </div>
  <div style="display:flex;border-bottom:1px solid #1e4a35;">
    <div style="flex:1;padding:10px 8px;text-align:center;border-right:1px solid #1e4a35;">
      <span style="display:block;font-size:9px;color:#4d8068;text-transform:uppercase;letter-spacing:0.8px;">Precio</span>
      <strong id="tse-price" style="display:block;font-size:12px;color:#6ee7a8;font-weight:700;margin-top:3px;"></strong>
    </div>
    <div style="flex:1;padding:10px 8px;text-align:center;border-right:1px solid #1e4a35;">
      <span style="display:block;font-size:9px;color:#4d8068;text-transform:uppercase;letter-spacing:0.8px;">Sorteo</span>
      <strong id="tse-date" style="display:block;font-size:12px;color:#6ee7a8;font-weight:700;margin-top:3px;"></strong>
    </div>
    <div style="flex:1;padding:10px 8px;text-align:center;">
      <span style="display:block;font-size:9px;color:#4d8068;text-transform:uppercase;letter-spacing:0.8px;">Lotería</span>
      <strong id="tse-lottery" style="display:block;font-size:12px;color:#6ee7a8;font-weight:700;margin-top:3px;"></strong>
    </div>
  </div>
  <div id="tse-grid" style="padding:14px 12px;display:grid;gap:4px;"></div>
  <div style="background:#06190f;padding:14px 20px;border-top:1px solid #1e4a35;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <span style="display:block;font-size:9px;color:#4d8068;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;">Contacto</span>
      <span id="tse-whatsapp" style="font-size:12px;color:#6ee7a8;font-weight:700;"></span>
    </div>
    <div style="text-align:right;">
      <span style="display:block;font-size:9px;color:#4d8068;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;">Vendidos</span>
      <span id="tse-count" style="font-size:13px;color:#6ee7a8;font-weight:700;"></span>
    </div>
  </div>
</div>

</div>
</body>
</html>
