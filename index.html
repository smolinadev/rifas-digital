<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <title>Rifa App</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="css/rifa.css" />
</head>
<body>

  <div class="app">

  <section class="hero">
  <span class="hero__badge">✦ Rifa App</span>
  <h1 class="hero__title">Gestiona tus rifas<br>en segundos.</h1>
  <p class="hero__sub">Sin papeles, sin fotos editadas.<br>Todo desde tu celular.</p>
  <button class="btn btn--primary" id="btn-nueva">+ Nueva rifa</button>
  
</section>

    <!-- MIS RIFAS -->
    <section class="list-section">
      <h2 class="section-title">Mis rifas</h2>

      <div class="list-empty" id="list-empty">
  <div class="empty-anim">
    <div class="empty-confetti">
      <div class="dot" style="width:8px;height:8px;background:#F5C842;border-radius:50%;left:20px;animation-duration:2s;animation-delay:0.1s;"></div>
      <div class="dot" style="width:6px;height:6px;background:#4a90d9;border-radius:2px;left:60px;animation-duration:2.3s;animation-delay:0.5s;"></div>
      <div class="dot" style="width:7px;height:7px;background:#e74c3c;border-radius:50%;left:100px;animation-duration:1.8s;animation-delay:0.2s;"></div>
      <div class="dot" style="width:5px;height:5px;background:#2ecc71;border-radius:2px;left:140px;animation-duration:2.5s;animation-delay:0.8s;"></div>
      <div class="dot" style="width:6px;height:6px;background:#F5C842;border-radius:2px;left:40px;animation-duration:2.1s;animation-delay:1.2s;"></div>
      <div class="dot" style="width:8px;height:8px;background:#9b59b6;border-radius:50%;left:120px;animation-duration:1.9s;animation-delay:0.6s;"></div>
    </div>
    <div class="empty-ticket">
      <div class="empty-ticket__body">
        <div class="empty-ticket__stripe"></div>
        <div class="empty-ticket__num">00</div>
        <div class="empty-ticket__label">Tu rifa</div>
      </div>
    </div>
  </div>
  <p class="empty-title">¡Crea tu primera rifa!</p>
  <p class="empty-sub">Gestiona tus números y comparte<br>el ticket actualizado al instante.</p>
</div>
<div class="modal-overlay hidden" id="modal-winner">
  <div class="modal">
    <p class="modal__num" id="winner-num">🏆 Sorteo</p>
    <h3 class="modal__title" id="winner-title">¿Cuál fue el número ganador?</h3>
    <input class="form-input" id="winner-input" type="number" placeholder="Ej: 42" />
    <div id="winner-result" class="modal__buyer" style="display:none;"></div>
    <div class="modal__actions">
      <button class="btn btn--primary btn--full" id="winner-confirm">Buscar ganador</button>
      <button class="btn btn--ghost" id="winner-cancel">Cancelar</button>
    </div>
  </div>
</div>

      <ul class="rifa-list" id="rifa-list"></ul>
    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
